# Advanced Layer 2 Configuration

# Complete Layer 2 configuration with all options
# Place this file at: .claude/guardrail.local.md

---
llm:
  # Provider (currently only anthropic supported)
  provider: anthropic

  # API key (use environment variable for security)
  api_key: ${ANTHROPIC_AUTH_TOKEN}

  # Model selection
  # - claude-3-5-sonnet-20241022: Recommended (fast, accurate)
  # - claude-3-opus-20240229: Most capable (slower, expensive)
  # - claude-3-haiku-20240307: Fastest (less accurate)
  model: ${GUARDRAIL_MODEL:-claude-3-5-sonnet-20241022}

  # Custom base URL (optional, for proxy or custom endpoint)
  # base_url: https://proxy.example.com/anthropic

  # Timeout in seconds (optional, default 30)
  # timeout: 30
---

# Configuration Notes

## Environment Variables

Set these in your shell:

```bash
# Required
export ANTHROPIC_AUTH_TOKEN=sk-ant-your-key-here

# Optional (with defaults)
export GUARDRAIL_MODEL=claude-3-5-sonnet-20241022
```

## Model Selection

Choose based on your needs:

- **Sonnet** (default): Best balance of speed, accuracy, cost
  - Latency: 200-500ms
  - Cost: ~$0.0012 per command
  - Accuracy: ~95%

- **Opus**: Most accurate, slowest, most expensive
  - Latency: 500-1000ms
  - Cost: ~$0.0030 per command
  - Accuracy: ~98%

- **Haiku**: Fastest, least accurate, cheapest
  - Latency: 100-300ms
  - Cost: ~$0.0003 per command
  - Accuracy: ~90%

## Custom Base URL

Use for:
- Corporate proxy
- Custom API endpoint
- Rate limiting proxy
- Logging/monitoring proxy

Example:
```yaml
base_url: https://api-proxy.company.com/anthropic
```

## Timeout Configuration

Increase timeout if:
- Network is slow
- Using Opus model
- Experiencing timeouts

Default: 30 seconds (usually sufficient)

## Security Best Practices

1. **Never commit API keys**: Use environment variables
2. **Add to .gitignore**: `.claude/*.local.md`
3. **Rotate keys**: Change periodically
4. **Monitor usage**: Check API dashboard
5. **Use separate keys**: Different key for guardrail if possible

## Testing Configuration

Test Layer 2 is working:

```bash
# Test novel command (should go to Layer 2)
echo '{"hook_event_name":"PreToolUse","tool_name":"Bash","tool_input":{"command":"docker run ubuntu"}}' | python -m guardrail.cli

# Check logs for Layer 2 usage
grep "Layer 2" .claude/guardrail.log
```

## Troubleshooting

### API key not found
```bash
# Check environment variable
echo $ANTHROPIC_AUTH_TOKEN

# Set if missing
export ANTHROPIC_AUTH_TOKEN=sk-ant-your-key-here
```

### 401 Unauthorized
- API key invalid or expired
- Generate new key at console.anthropic.com

### 429 Rate Limit
- Too many requests
- Add more Layer 1 rules to reduce LLM calls
- Wait before retrying

### Network timeout
- Increase timeout in config
- Check network connectivity
- Verify base_url if using proxy

## Performance Optimization

Reduce Layer 2 calls by adding Layer 1 rules:

```yaml
# In .claude/guardrail.yml
allow_rules:
  bash:
    - "^docker\\s+(ps|images|version)"
    - "^kubectl\\s+get"

ask_rules:
  bash:
    - "^docker\\s+run"
    - "^kubectl\\s+apply"
```

This moves common commands to Layer 1 (free, fast).
